<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0;
            max-width: 100%;
            box-sizing: border-box;

        }
        
        .text{
            overflow: hidden;
            width: 80%;
            margin:10%;
        }
p{
             transform: translate(0, -100%);

}
       .inner{
           width:80%;
           z-index: 1;
           border-radius: 20px; 
           background-color: rgb(124, 115, 28);
           border-left:9px solid rgb(124, 115, 28);
           border-top: 9px solid rgb(124, 115, 28);
           border-bottom:3px solid rgb(124, 115, 28);
           border-right: 3px solid rgb(124, 115, 28);
       }
        .inner img{
           border-radius: 10px;
        }
       .innerm{
           width:60%;
           margin: 0;
           z-index: 2;
           height: 0%;
           transform: translate(49%, -96%);
           border-radius: 20px;
           background-color: rgb(106, 129, 20);
           border-left: 8px solid rgb(106, 129, 20);
           border-top: 8px solid rgb(106, 129, 20);
           border-bottom:3px solid rgb(106, 129, 20);
           border-right: 3px solid rgb(106, 129, 20);
        }
        .innerm img{
            border-radius: 10px;
        }
        .innermb{
           width: 20%;
           z-index: 3;
           transform: translate(388%, -182%);
           border-radius: 20px;
           background-color: rgb(29, 29, 31);
           border-left: 6px solid  rgb(29, 29, 31);
           border-top: 19px solid  rgb(29, 29, 31);
           border-bottom:19px solid  rgb(29, 29, 31);
           border-right: 6px solid rgb(29, 29, 31);
        }
        .innermb img{
          border-radius: 0px;
        }
        @media ( max-width:600px)
        {
            .text{
                margin: 10% 0;
                width: 100%;
                
            }
            p{
             transform: translate(0, -15%);

}
          .demo{
            width: 100%;
            margin:0 auto;
           }
           .demo .inner{
           width:80%;
           z-index: 1;
           border-radius: 5px; 
            transform: translate(1%, 1%);
            background-color:rgb(33, 34, 33);
           border-left:1px solid rgb(33, 34, 33);
           border-top: 1px solid rgb(33, 34, 33);
           border-bottom:5px solid rgb(33, 34, 33);
           border-right: 1px solid rgb(33, 34, 33);
         }
             .demo .inner img{
           border-radius: 1px;
          }
         .demo .innerm{
           width:60%;
           margin: 0;
           z-index: 2;
           height: 0%;
           border-radius: 5px;
           background-color:rgb(33, 34, 33);
           transform: translate(60%, -96%,);
           border-left: 2px solid rgb(33, 34, 33);
           border-top: 2px solid rgb(33, 34, 33);
           border-bottom:3px solid rgb(33, 34, 33);
           border-right: 2px solid rgb(33, 34, 33);
        }
        .innerm img{
            border-radius: 1px;
        }
            .innermb{
           width: 20%;
           z-index: 3;
          background-color: rgb(16, 69, 168);     
          transform: translate(398%, -182%);
           border-radius:5px;
           border-left: 2px solid rgb(16, 69, 168);
           border-top: 5px solid rgb(16, 69, 168);
           border-bottom:5px solid rgb(16, 69, 168);
           border-right: 2px solid rgb(16, 69, 168);
        }
        .innermb img{
          border-radius: 1px;
        }
    }
    </style>
    <link rel="stylesheet" href="../myCss/loader.css">
    <script src="../js/loader.js"></script>
</head>

<body>

   <div class="text">
        <div class="demo">
            <div class="inner">
                <img src="Capture.PNG" alt="">
                
                </div>
                <div class="innerm">
                    <img src="m.PNG" alt="">
                </div>
                <div class="innermb">
                    <img src="mb.PNG" alt="">
            </div>
   </div>
    </div>
</body>
</html>
