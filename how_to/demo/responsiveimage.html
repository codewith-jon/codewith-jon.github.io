<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Responsive Image Grid Demo</title>
    <link rel="stylesheet" href="../../myCss/button.css">

<body>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            padding: 0 5px;

        }


        .column {
            flex: 25%;
            padding: 2px;
            max-width: 25%;
        }

        .column img {
            width: 100%;
        }

        /*make it responsive*/
        @media (max-width:885px) {
            .column {
                flex: 50%;
                max-width: 50%;
            }
        }

        /*mobile view*/
        @media (max-width:550px) {
            .column {
                flex: 100%;
                max-width: 100%;
            }
        }
    </style>

    <body>

        <div class="row">

            <div class="column">
                <div class="bck">
